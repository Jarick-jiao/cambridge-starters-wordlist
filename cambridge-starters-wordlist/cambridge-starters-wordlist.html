<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>剑桥少儿英语学习平台</title>
  <style>
    @font-face {
      font-family: 'Outfit';
      src: url('./_shared/fonts/Outfit-Regular.ttf') format('truetype');
      font-weight: 400;
    }
    @font-face {
      font-family: 'Outfit';
      src: url('./_shared/fonts/Outfit-Bold.ttf') format('truetype');
      font-weight: 700;
    }
  </style>
  <style>
    :root {
      --bg: #FFFBF0;
      --bg2: #FFF3DC;
      --ink: #2D2A24;
      --muted: #8A8477;
      --rule: #E8DFD0;
      --accent: #F2763D;
      --accent2: #3DB5E6;
      --green: #5CB85C;
      --pink: #E8668B;
      --purple: #9B6DD7;
      --yellow: #F5C542;
      --font: 'Outfit', 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      --max: 920px;
      --surface: var(--bg2);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; scroll-behavior: smooth; }
    body { font-family: var(--font); color: var(--ink); background: var(--bg); line-height: 1.75; padding: 0; }
    article.page { max-width: var(--max); margin: 0 auto; }

    .hero { position: relative; overflow: hidden; border-radius: 0 0 24px 24px; margin-bottom: 2rem; }
    .hero img { width: 100%; height: 260px; object-fit: cover; display: block; }
    .hero-overlay { position: absolute; bottom: 0; left: 0; right: 0; background: linear-gradient(transparent, rgba(45,42,36,0.85)); padding: 2rem 2rem 1.5rem; color: #fff; }
    .hero-overlay h1 { font-size: 1.8rem; font-weight: 700; margin-bottom: 0.25rem; }
    .hero-overlay p { font-size: 0.95rem; opacity: 0.9; }

    .page-nav { display: flex; flex-wrap: wrap; gap: 0.5rem; padding: 0.8rem 1.5rem; margin-bottom: 0; position: sticky; top: 0; background: var(--bg); z-index: 11; border-bottom: 1px solid var(--rule); }
    .page-nav a { display: inline-block; padding: 0.4rem 1rem; border-radius: 20px; font-size: 0.85rem; font-weight: 700; text-decoration: none; color: var(--ink); background: var(--bg2); border: 1.5px solid var(--rule); transition: all 0.2s; white-space: nowrap; }
    .page-nav a:hover, .page-nav a:focus { background: var(--accent); color: #fff; border-color: var(--accent); }
    .page-nav a.active { background: var(--accent) !important; color: #fff !important; border-color: var(--accent) !important; }

    /* ===== STAGE TABS (top nav row 1) ===== */
    .stage-tabs { display: flex; flex-wrap: wrap; gap: 0.4rem; padding: 0.5rem 1.5rem; background: var(--bg); }
    .stage-tab { display: inline-flex; align-items: center; gap: 0.3rem; padding: 0.55rem 1.2rem; border-radius: 24px; font-size: 0.95rem; font-weight: 700; color: var(--ink); background: var(--bg2); border: 2px solid var(--rule); cursor: pointer; transition: all 0.2s; white-space: nowrap; text-decoration: none; }
    .stage-tab:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
    .stage-tab.active { background: linear-gradient(135deg, var(--accent), var(--accent2)) !important; color: #fff !important; border-color: transparent !important; box-shadow: 0 2px 8px rgba(242,118,61,0.3); }

    /* ===== CHAPTER NAV (top nav row 2) ===== */
    .chapter-nav { display: flex; flex-wrap: wrap; gap: 0.3rem; padding: 0.4rem 1.5rem; background: var(--bg); border-bottom: 1px solid var(--rule); overflow-x: auto; -webkit-overflow-scrolling: touch; }
    .chapter-nav a { display: inline-block; padding: 0.3rem 0.8rem; border-radius: 16px; font-size: 0.78rem; font-weight: 600; text-decoration: none; color: var(--ink); background: transparent; border: 1px solid var(--rule); transition: all 0.15s; white-space: nowrap; }
    .chapter-nav a:hover { background: var(--bg2); }
    .chapter-nav a.active { background: var(--accent2); color: #fff; border-color: var(--accent2); }

    /* ===== BREADCRUMB ===== */
    .breadcrumb { display: flex; align-items: center; gap: 0.3rem; padding: 0.5rem 0; margin-bottom: 0.5rem; font-size: 0.8rem; color: var(--muted); flex-wrap: wrap; }
    .breadcrumb a { color: var(--accent2); text-decoration: none; font-weight: 600; }
    .breadcrumb a:hover { text-decoration: underline; }
    .breadcrumb .sep { margin: 0 0.15rem; color: var(--rule); }
    .breadcrumb .current { color: var(--ink); font-weight: 700; }

    /* ===== PHASE BADGE ===== */
    .phase-badge { display: inline-flex; align-items: center; padding: 0.2rem 0.7rem; border-radius: 12px; font-size: 0.72rem; font-weight: 700; margin-right: 0.4rem; }
    .phase-badge.starters { background: #FFF0E5; color: var(--accent); }
    .phase-badge.movers { background: #E5F4FF; color: var(--accent2); }

    /* ===== CHAPTER PAGE ===== */
    .chapter-page { padding: 0 0 1rem; }
    .chapter-page + .chapter-page { margin-top: 1.5rem; }

    /* ===== GRAMMAR TABLE WRAP ===== */
    .grammar-table-wrap { overflow-x: auto; max-height: 600px; margin-bottom: 0.75rem; border-radius: 12px; border: 2px solid var(--accent2); }

    .content { padding: 0 1.5rem 3rem; }
    section { margin-bottom: 2.5rem; }
    h2 { font-size: 1.4rem; font-weight: 700; margin-bottom: 0.75rem; padding-bottom: 0.5rem; border-bottom: 3px solid var(--accent); display: flex; align-items: center; gap: 0.5rem; }
    h2 .icon { display: inline-flex; align-items: center; justify-content: center; width: 34px; height: 34px; border-radius: 10px; font-size: 1rem; flex-shrink: 0; }
    h3 { font-size: 1.05rem; font-weight: 700; margin: 1.2rem 0 0.6rem; color: var(--accent); }
    .section-intro { font-size: 0.9rem; color: var(--muted); margin-bottom: 0.75rem; }

    /* WORD GRID */
    .word-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(135px, 1fr)); gap: 0.65rem; margin-bottom: 0.75rem; }
    .word-card { background: var(--bg2); border-radius: 12px; padding: 0.7rem; text-align: center; border: 2px solid transparent; transition: all 0.2s; cursor: pointer; position: relative; user-select: none; }
    .word-card:hover { transform: translateY(-2px); border-color: var(--accent); }
    .word-card.mastered { background: #E8F8E8; border-color: var(--green); }
    .word-card.mastered .cn { color: var(--green); }
    .word-card .master-check { position: absolute; top: 4px; right: 6px; font-size: 0.85rem; opacity: 0; transition: opacity 0.2s; color: var(--green); }
    .word-card.mastered .master-check { opacity: 1; }
    .word-card .en { font-size: 1.1rem; font-weight: 700; color: var(--ink); margin-bottom: 0.1rem; }
    .word-card .phonetic { font-size: 0.68rem; color: var(--muted); margin-bottom: 0.2rem; font-style: italic; }
    .word-card .cn { font-size: 0.82rem; color: var(--accent); font-weight: 600; }
    .speak-btn { display: inline-flex; align-items: center; justify-content: center; width: 28px; height: 28px; border-radius: 50%; background: var(--accent2); color: #fff; border: none; cursor: pointer; font-size: 0.9rem; margin-left: 0.3rem; vertical-align: middle; transition: transform 0.15s, background 0.15s; flex-shrink: 0; }
    .speak-btn:hover { background: #2A9BC7; transform: scale(1.15); }
    .speak-btn:active { transform: scale(0.95); }

    /* TABLES */
    .table-wrap { overflow-x: auto; max-height: 600px; margin-bottom: 0.75rem; }
    table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    thead th { background: var(--accent); color: #fff; padding: 0.5rem 0.7rem; text-align: left; font-weight: 600; font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.04em; position: sticky; top: 0; z-index: 2; }
    tbody td { padding: 0.5rem 0.7rem; border-bottom: 1px solid var(--rule); vertical-align: top; }
    tbody tr:nth-child(even) { background: var(--bg2); }
    tbody tr:hover { background: #FFEFD5; }
    .en-sentence { font-weight: 600; color: var(--ink); }
    .cn-sentence { color: var(--muted); font-size: 0.82rem; }
    .highlight { color: var(--accent); font-weight: 700; }

    /* GRAMMAR BOX */
    .grammar-box { background: #fff; border: 2px solid var(--accent2); border-radius: 14px; padding: 1rem 1.2rem; margin-bottom: 0.75rem; }
    .grammar-box .title { font-weight: 700; font-size: 0.95rem; color: var(--accent2); margin-bottom: 0.4rem; }
    .grammar-box .formula { background: var(--bg2); border-radius: 8px; padding: 0.6rem 0.8rem; margin: 0.4rem 0; font-weight: 600; font-size: 0.9rem; text-align: center; border-left: 4px solid var(--accent2); }
    .grammar-box ul { list-style: none; padding: 0; margin-top: 0.4rem; }
    .grammar-box ul li { padding: 0.25rem 0; padding-left: 1.1rem; position: relative; font-size: 0.88rem; }
    .grammar-box ul li::before { content: '\2726'; position: absolute; left: 0; color: var(--accent2); }

    .bg-orange { background: #FFF0E5; color: var(--accent); }
    .bg-blue { background: #E5F4FF; color: var(--accent2); }
    .bg-green { background: #E8F8E8; color: var(--green); }
    .bg-pink { background: #FFE8F0; color: var(--pink); }
    .bg-purple { background: #F0E8FF; color: var(--purple); }
    .bg-yellow { background: #FFF8E0; color: #D4A017; }

    .tip { background: #FFF8E0; border-left: 4px solid var(--yellow); border-radius: 0 10px 10px 0; padding: 0.7rem 1rem; margin: 0.75rem 0; font-size: 0.85rem; }
    .tip strong { color: #D4A017; }

    /* ===== CHAPTER DIVIDERS ===== */
    .chapter-header { margin: 2.5rem 0 1rem; padding: 0.9rem 1.5rem; background: linear-gradient(90deg, var(--accent) 0%, var(--accent2) 100%); border-radius: 12px; color: #fff; font-size: 1.1rem; font-weight: 700; display: flex; align-items: center; gap: 0.6rem; box-shadow: 0 2px 8px rgba(61,181,230,0.25); }
    .chapter-header .chap-num { background: rgba(255,255,255,0.2); padding: 0.25rem 0.7rem; border-radius: 8px; font-size: 0.85rem; font-weight: 800; }
    .chapter-header .chap-icon { font-size: 1.3rem; }

    /* ===== TOC SIDEBAR ===== */
    .toc-sidebar { position: fixed; left: 0; top: 0; bottom: 0; width: 220px; background: var(--bg); border-right: 1.5px solid var(--rule); z-index: 100; overflow-y: auto; transform: translateX(-100%); transition: transform 0.3s ease; -webkit-overflow-scrolling: touch; }
    .toc-sidebar.open { transform: translateX(0); }
    .toc-sidebar .toc-header { padding: 0.8rem 1rem; font-weight: 800; font-size: 0.95rem; color: var(--accent); border-bottom: 1.5px solid var(--rule); position: sticky; top: 0; background: var(--bg); z-index: 1; display: flex; align-items: center; gap: 0.4rem; }
    .toc-sidebar .toc-chap { font-size: 0.72rem; font-weight: 700; color: var(--accent); padding: 0.55rem 1rem 0.1rem; text-transform: uppercase; letter-spacing: 0.03em; }
    .toc-sidebar .toc-chap:first-child { padding-top: 0.5rem; }
    .toc-sidebar .toc-items { padding: 0.15rem 0.6rem 0.4rem; }
    .toc-sidebar .toc-items a { display: block; padding: 0.28rem 0.6rem; border-radius: 8px; font-size: 0.78rem; font-weight: 600; text-decoration: none; color: var(--ink); transition: all 0.15s; margin-bottom: 1px; }
    .toc-sidebar .toc-items a:hover, .toc-sidebar .toc-items a.active { background: var(--accent); color: #fff; }
    .toc-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.3); z-index: 99; display: none; }
    .toc-overlay.open { display: block; }
    .toc-fab { position: fixed; left: 0.8rem; bottom: 1.2rem; z-index: 50; width: 48px; height: 48px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; border: none; font-size: 1.4rem; cursor: pointer; box-shadow: 0 3px 12px rgba(61,181,230,0.4); display: flex; align-items: center; justify-content: center; transition: transform 0.2s; }
    .toc-fab:hover { transform: scale(1.1); }
    .toc-fab.hide { transform: scale(0); pointer-events: none; }
    .page-content-with-toc { padding-left: 0; }
    @media(min-width: 900px) {
      .toc-sidebar.open { transform: translateX(0); box-shadow: none; border-right: 1.5px solid var(--rule); }
      .toc-overlay { display: none !important; }
      .toc-fab { display: none; }
      .page-content-with-toc.toc-visible .english-main { margin-left: 230px; }
    }
    .chapter-wrap { padding: 0 0.5rem; }
    .chapter-wrap + .chapter-wrap { margin-top: 0.5rem; }

    /* ===== TOAST ===== */
    .toast-container { position: fixed; top: 1rem; right: 1rem; z-index: 9999; display: flex; flex-direction: column; gap: 0.5rem; pointer-events: none; }
    .toast { pointer-events: auto; padding: 0.7rem 1.2rem; border-radius: 10px; color: #fff; font-size: 0.9rem; font-weight: 600; box-shadow: 0 4px 16px rgba(0,0,0,0.15); transform: translateX(120%); animation: toastIn 0.35s ease forwards; max-width: 320px; display: flex; align-items: center; gap: 0.5rem; }
    .toast.out { animation: toastOut 0.3s ease forwards; }
    .toast.success { background: #5CB85C; }
    .toast.error { background: #E74C3C; }
    .toast.info { background: #3DB5E6; }
    .toast.warn { background: #F5C542; color: #2D2A24; }
    @keyframes toastIn { to { transform: translateX(0); } }
    @keyframes toastOut { to { transform: translateX(120%); opacity: 0; } }

    /* ===== PAGE TRANSITION ===== */
    .page-section { animation: fadeIn 0.25s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

    /* ===== MATH FEEDBACK ===== */
    .math-correct { animation: correctPulse 0.5s ease; }
    .math-wrong { animation: wrongShake 0.5s ease; }
    @keyframes correctPulse { 0% { background: #E8F8E8; } 50% { background: #5CB85C; color: #fff; } 100% { background: var(--surface); color: var(--ink); } }
    @keyframes wrongShake { 0%, 100% { transform: translateX(0); } 20% { transform: translateX(-8px); } 40% { transform: translateX(8px); } 60% { transform: translateX(-5px); } 80% { transform: translateX(5px); } }
    .math-timer { font-size: 1.1rem; font-weight: 700; color: var(--accent); font-variant-numeric: tabular-nums; }
    .math-feedback-icon { font-size: 2.5rem; display: block; margin: 0.5rem 0; }
    .wrong-answer-list { background: #FFF5F5; border: 1px solid #FFCDD2; border-radius: 10px; padding: 1rem; margin: 1rem 0; text-align: left; }
    .wrong-answer-list h4 { color: #E74C3C; margin-bottom: 0.5rem; }
    .wrong-answer-item { display: flex; justify-content: space-between; padding: 0.3rem 0; border-bottom: 1px solid #FFEBEE; font-size: 0.9rem; }
    .wrong-answer-item:last-child { border-bottom: none; }
    .wrong-answer-item .wrong-q { font-weight: 600; }
    .wrong-answer-item .wrong-ans { color: #E74C3C; text-decoration: line-through; }
    .wrong-answer-item .correct-ans { color: #5CB85C; font-weight: 700; }
    .skip-btn { padding: 0.6rem 1.2rem; background: var(--bg2); color: var(--muted); border: 1px solid var(--rule); border-radius: 8px; font-size: 0.9rem; cursor: pointer; margin-left: 0.5rem; transition: all 0.15s; }
    .skip-btn:hover { background: var(--rule); color: var(--ink); }

    /* ===== DASHBOARD TASK CARD ===== */
    .dash-task-card { display: flex; justify-content: space-between; align-items: center; padding: 0.6rem 0.8rem; border-bottom: 1px solid var(--rule); border-radius: 8px; cursor: pointer; transition: background 0.15s; margin-bottom: 0.3rem; }
    .dash-task-card:hover { background: var(--bg2); }
    .dash-task-card .task-info { flex: 1; }
    .dash-task-card .task-subject { font-weight: 700; font-size: 0.9rem; }
    .dash-task-card .task-meta { font-size: 0.78rem; color: var(--muted); margin-top: 2px; }
    .dash-task-card .task-arrow { color: var(--muted); font-size: 1.1rem; }

    /* PROGRESS */
    .progress-section { background: #fff; border-radius: 14px; padding: 1rem 1.2rem; margin-bottom: 1.5rem; border: 1px solid var(--rule); }
    .progress-section h3 { margin-top: 0; font-size: 0.95rem; color: var(--ink); }
    .progress-row { display: flex; align-items: center; gap: 0.6rem; margin: 0.4rem 0; font-size: 0.82rem; }
    .progress-label { width: 65px; font-weight: 600; flex-shrink: 0; text-align: right; }
    .progress-bar { flex: 1; height: 12px; background: var(--bg2); border-radius: 6px; overflow: hidden; }
    .progress-fill { height: 100%; border-radius: 6px; transition: width 0.4s; }
    .progress-count { font-size: 0.78rem; color: var(--muted); flex-shrink: 0; width: 45px; }
    .progress-total { font-size: 0.85rem; color: var(--accent); font-weight: 700; margin-top: 0.5rem; }
    .reset-btn { background: none; border: 1px solid var(--rule); border-radius: 6px; padding: 0.25rem 0.6rem; font-size: 0.75rem; color: var(--muted); cursor: pointer; margin-top: 0.5rem; font-family: var(--font); }
    .reset-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* VOICE HINT */
    .voice-hint { font-size: 0.78rem; color: var(--accent2); margin-bottom: 1rem; padding: 0.5rem 0.8rem; background: #E5F4FF; border-radius: 8px; display: flex; align-items: center; gap: 0.4rem; }
    .voice-hint .vol-icon { font-size: 1rem; }

    /* ===== ENGLISH PAGE LAYOUT ===== */
    #page-english .english-body { display: flex; }
    #page-english .english-main { flex: 1; min-width: 0; }

    @media print {
      .page-nav, .stage-tabs, .chapter-nav, .toc-sidebar, .toc-overlay, .toc-fab, .voice-hint, .speak-btn, .progress-section, .breadcrumb, .phase-badge { display: none !important; }
      .hero { border-radius: 0; }
      .word-card { border-color: transparent !important; }
      .word-card:hover { transform: none; }
      .word-card.mastered .master-check { opacity: 1; }
      section { page-break-inside: avoid; }
    }
    @media (max-width: 600px) {
      .hero img { height: 180px; }
      .hero-overlay h1 { font-size: 1.3rem; }
      .content { padding: 0 1rem 2rem; }
      .word-grid { grid-template-columns: repeat(auto-fill, minmax(105px, 1fr)); gap: 0.4rem; }
      h2 { font-size: 1.15rem; }
      .grammar-box { padding: 0.8rem; }
      .stage-tab { font-size: 0.82rem; padding: 0.4rem 0.9rem; }
    }
    /* Timeline heatmap */
    .timeline-grid{display:grid;grid-template-rows:repeat(7,28px);grid-auto-flow:column;gap:3px;margin-top:0.8rem;}
    .timeline-cell{width:28px;height:28px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:0.65rem;color:var(--muted);position:relative;}
    .timeline-cell.l0{background:var(--bg2);}
    .timeline-cell.l1{background:#fde8cd;}
    .timeline-cell.l2{background:var(--yellow);}
    .timeline-cell.l3{background:var(--green);color:#fff;}
    .timeline-cell.today{border:2px solid var(--accent);}
    .timeline-labels{display:grid;grid-template-rows:repeat(7,28px);gap:3px;margin-right:0.4rem;}
    .timeline-labels span{height:28px;display:flex;align-items:center;font-size:0.65rem;color:var(--muted);}
    .timeline-months{display:flex;gap:0;justify-content:flex-start;margin-bottom:0.3rem;padding-left:calc(2.2rem + 0.4rem);}
    .timeline-months span{font-size:0.7rem;color:var(--muted);font-weight:600;}
    .filter-group{display:inline-flex;gap:0.25rem;vertical-align:middle;}
    .filter-btn{padding:0.15rem 0.5rem;border:1px solid var(--rule);border-radius:12px;background:var(--bg);color:var(--muted);font-size:0.7rem;cursor:pointer;transition:all 0.15s;}
    .filter-btn.active{background:var(--accent);color:#fff;border-color:var(--accent);}
    .filter-btn:hover{border-color:var(--accent);}
    .group-header{display:flex;align-items:center;flex-wrap:wrap;gap:0.5rem;margin:1.2rem 0 0.6rem;}
    .group-header h3{margin:0;}
  </style>
</head>
<body>
  <article class="page">
    <div class="hero">
      <img src="assets/hero_cover.jpg" alt="剑桥少儿英语学习">
      <div class="hero-overlay">
        <h1>剑桥少儿英语学习平台</h1>
        <p>Starters &amp; Movers 单词语法 · 数学练习 · 任务管理 · 进度追踪</p>
      </div>
    </div>

    <!-- ===== TOP NAV: Row 1 - Stage Tabs ===== -->
    <nav class="stage-tabs" id="stage-tabs">
      <a href="#" class="stage-tab active" data-page="english" data-phase="starters" onclick="switchPhase('starters');return false;">Starters 阶段</a>
      <a href="#" class="stage-tab" data-page="english" data-phase="movers" onclick="switchPhase('movers');return false;">Movers 阶段</a>
      <a href="#" class="stage-tab" data-page="math" onclick="showPage('math');return false;">数学练习</a>
      <a href="#" class="stage-tab" data-page="dashboard" onclick="showPage('dashboard');return false;">仪表盘</a>
      <a href="#" class="stage-tab" data-page="tasks" onclick="showPage('tasks');return false;">任务</a>
    </nav>

    <!-- ===== TOP NAV: Row 2 - Chapter Nav (dynamic) ===== -->
    <nav class="chapter-nav" id="chapter-nav" style="display:none;"></nav>

    <!-- ===== TOC SIDEBAR (dynamic content) ===== -->
    <div class="toc-overlay" id="toc-overlay" onclick="closeToc()"></div>
    <nav class="toc-sidebar" id="toc-sidebar">
      <div class="toc-header" id="toc-header-text">&#x1F4D6; 学习目录</div>
      <div id="toc-content"></div>
    </nav>
    <button class="toc-fab" id="toc-fab" onclick="toggleTocSidebar()">&#x1F4D6;</button>

    <!-- ========== ENGLISH PAGE ========== -->
    <section id="page-english" class="page-section" style="display:none;">
      <div class="content page-content-with-toc">
        <div class="english-body">
          <div class="english-main">
            <!-- BREADCRUMB -->
            <div id="breadcrumb-area"></div>
            <!-- VOICE HINT -->
            <div class="voice-hint" id="voice-hint">
              <span class="vol-icon">&#x1F50A;</span>

    { key: 'be-verb', title: 'be 动词 am / is / are', icon: '&#x270D;', iconBg: 'bg-yellow', type: 'grammar', chapter: '第五章 语法专题',
      content: '<p class="section-intro">be 动词表示"是"，是最基础的英语动词。根据主语不同，使用 am、is 或 are。</p><div class="table-wrap"><table><thead><tr><th>英文</th><th>中文</th></tr></thead><tbody><tr><td class="en-sentence">I <span class="highlight">am</span> a boy.</td><td class="cn-sentence">我是一个男孩。</td></tr><tr><td class="en-sentence">She <span class="highlight">is</span> my friend.</td><td class="cn-sentence">她是我的朋友。</td></tr><tr><td class="en-sentence">They <span class="highlight">are</span> happy.</td><td class="cn-sentence">他们很开心。</td></tr><tr><td class="en-sentence">The cat <span class="highlight">is</span> under the table.</td><td class="cn-sentence">猫在桌子下面。</td></tr><tr><td class="en-sentence">You <span class="highlight">are</span> ten years old.</td><td class="cn-sentence">你十岁了。</td></tr><tr><td class="en-sentence">He <span class="highlight">is</span> a teacher.</td><td class="cn-sentence">他是一位老师。</td></tr></tbody></table></div><div class="tip"><strong>小贴士：</strong>I 用 am，he/she/it 和单数名词用 is，we/you/they 和复数名词用 are。</div>'
    },
    { key: 'articles', title: '冠词 a / an / the', icon: '&#x270D;', iconBg: 'bg-green', type: 'grammar', chapter: '第五章 语法专题',
      content: '<p class="section-intro">冠词放在名词前面，表示泛指或特指。</p><div class="table-wrap"><table><thead><tr><th>英文</th><th>中文</th></tr></thead><tbody><tr><td class="en-sentence">I have <span class="highlight">a</span> dog.</td><td class="cn-sentence">我有一只狗。</td></tr><tr><td class="en-sentence">This is <span class="highlight">an</span> apple.</td><td class="cn-sentence">这是一个苹果。</td></tr><tr><td class="en-sentence"><span class="highlight">The</span> cat is on the bed.</td><td class="cn-sentence">那只猫在床上。</td></tr><tr><td class="en-sentence">She is <span class="highlight">a</span> teacher.</td><td class="cn-sentence">她是一位老师。</td></tr><tr><td class="en-sentence">Look at <span class="highlight">the</span> bird!</td><td class="cn-sentence">看那只鸟！</td></tr></tbody></table></div><div class="tip"><strong>小贴士：</strong>a 用在辅音音素开头的词前（a book），an 用在元音音素开头的词前（an apple）。the 表示特指，指双方都知道的人或物。</div>'
    },
    { key: 'this-that', title: 'this / that', icon: '&#x270D;', iconBg: 'bg-orange', type: 'grammar', chapter: '第五章 语法专题',
      content: '<p class="section-intro">this 指近处的事物，that 指远处的事物。</p><div class="table-wrap"><table><thead><tr><th>英文</th><th>中文</th></tr></thead><tbody><tr><td class="en-sentence"><span class="highlight">This</span> is my book.</td><td class="cn-sentence">这是我的书。</td></tr><tr><td class="en-sentence"><span class="highlight">That</span> is a big tree.</td><td class="cn-sentence">那是一棵大树。</td></tr><tr><td class="en-sentence">Is <span class="highlight">this</span> your pen?</td><td class="cn-sentence">这是你的笔吗？</td></tr><tr><td class="en-sentence"><span class="highlight">That</span> is my school.</td><td class="cn-sentence">那是我的学校。</td></tr></tbody></table></div><div class="tip"><strong>小贴士：</strong>this 指离自己近的，that 指离自己远的。复数形式分别是 these 和 those。</div>'
    },
    { key: 'like', title: 'I like / I don\'t like', icon: '&#x270D;', iconBg: 'bg-pink', type: 'grammar', chapter: '第五章 语法专题',
      content: '<p class="section-intro">like 表示"喜欢"，后面可以接名词或动词 -ing 形式。</p><div class="table-wrap"><table><thead><tr><th>英文</th><th>中文</th></tr></thead><tbody><tr><td class="en-sentence">I <span class="highlight">like</span> apples.</td><td class="cn-sentence">我喜欢苹果。</td></tr><tr><td class="en-sentence">I <span class="highlight">don\'t like</span> fish.</td><td class="cn-sentence">我不喜欢鱼。</td></tr><tr><td class="en-sentence">She <span class="highlight">likes</span> swimming.</td><td class="cn-sentence">她喜欢游泳。</td></tr><tr><td class="en-sentence">Do you <span class="highlight">like</span> reading?</td><td class="cn-sentence">你喜欢阅读吗？</td></tr><tr><td class="en-sentence">He <span class="highlight">likes</span> playing football.</td><td class="cn-sentence">他喜欢踢足球。</td></tr></tbody></table></div><div class="tip"><strong>小贴士：</strong>like 后面接名词（like apples）或动名词（like swimming）。第三人称单数要加 s：he likes。否定用 don\'t like，第三人称用 doesn\'t like。</div>'
    },
    { key: 'imperative', title: '祈使句', icon: '&#x270D;', iconBg: 'bg-purple', type: 'grammar', chapter: '第五章 语法专题',
      content: '<p class="section-intro">祈使句用来表示请求、命令或建议，通常省略主语 you。</p><div class="table-wrap"><table><thead><tr><th>英文</th><th>中文</th></tr></thead><tbody><tr><td class="en-sentence"><span class="highlight">Open</span> your book, please.</td><td class="cn-sentence">请打开你的书。</td></tr><tr><td class="en-sentence"><span class="highlight">Sit</span> down.</td><td class="cn-sentence">坐下。</td></tr><tr><td class="en-sentence"><span class="highlight">Don\'t</span> run in the classroom.</td><td class="cn-sentence">不要在教室里跑。</td></tr><tr><td class="en-sentence"><span class="highlight">Look</span> at the board.</td><td class="cn-sentence">看黑板。</td></tr><tr><td class="en-sentence"><span class="highlight">Be</span> quiet, please.</td><td class="cn-sentence">请安静。</td></tr></tbody></table></div><div class="tip"><strong>小贴士：</strong>祈使句以动词原形开头。否定形式在动词前加 Don\'t。加上 please 会更礼貌。</div>'
    },
    { key: 'can', title: 'can / can\'t', icon: '&#x270D;', iconBg: 'bg-blue', type: 'grammar', chapter: '第五章 语法专题',
      content: '<p class="section-intro">can 表示能力或请求许可，can\'t (cannot) 表示不能。</p><div class="table-wrap"><table><thead><tr><th>英文</th><th>中文</th></tr></thead><tbody><tr><td class="en-sentence">I <span class="highlight">can</span> swim.</td><td class="cn-sentence">我会游泳。</td></tr><tr><td class="en-sentence">She <span class="highlight">can\'t</span> fly.</td><td class="cn-sentence">她不会飞。</td></tr><tr><td class="en-sentence"><span class="highlight">Can</span> you ride a bike?</td><td class="cn-sentence">你会骑自行车吗？</td></tr><tr><td class="en-sentence">Yes, I <span class="highlight">can</span>.</td><td class="cn-sentence">是的，我会。</td></tr><tr><td class="en-sentence"><span class="highlight">Can</span> I have some water?</td><td class="cn-sentence">我能喝点水吗？</td></tr></tbody></table></div><div class="tip"><strong>小贴士：</strong>can 后面接动词原形，没有人称变化（I can, she can, they can）。否定形式是 can\'t 或 cannot。</div>'
    },
    { key: 'have-got', title: 'have / has got', icon: '&#x270D;', iconBg: 'bg-green', type: 'grammar', chapter: '第五章 语法专题',
      content: '<p class="section-intro">have got / has got 表示"拥有"，常用于英式英语口语。</p><div class="table-wrap"><table><thead><tr><th>英文</th><th>中文</th></tr></thead><tbody><tr><td class="en-sentence">I <span class="highlight">have got</span> a new bike.</td><td class="cn-sentence">我有一辆新自行车。</td></tr><tr><td class="en-sentence">She <span class="highlight">has got</span> long hair.</td><td class="cn-sentence">她有长头发。</td></tr><tr><td class="en-sentence">Have you <span class="highlight">got</span> a pet?</td><td class="cn-sentence">你有宠物吗？</td></tr><tr><td class="en-sentence">He <span class="highlight">hasn\'t got</span> a brother.</td><td class="cn-sentence">他没有兄弟。</td></tr></tbody></table></div><div class="tip"><strong>小贴士：</strong>I/you/we/they 用 have got，he/she/it 用 has got。否定形式是 haven\'t got / hasn\'t got。</div>'
    },
    { key: 'there-is', title: 'There is / There are', icon: '&#x270D;', iconBg: 'bg-orange', type: 'grammar', chapter: '第五章 语法专题',
      content: '<p class="section-intro">There is / There are 表示"某处有某物"。</p><div class="table-wrap"><table><thead><tr><th>英文</th><th>中文</th></tr></thead><tbody><tr><td class="en-sentence"><span class="highlight">There is</span> a book on the desk.</td><td class="cn-sentence">桌上有一本书。</td></tr><tr><td class="en-sentence"><span class="highlight">There are</span> three cats in the room.</td><td class="cn-sentence">房间里有三只猫。</td></tr><tr><td class="en-sentence"><span class="highlight">There is</span> some water in the glass.</td><td class="cn-sentence">杯子里有些水。</td></tr><tr><td class="en-sentence"><span class="highlight">There are</span> many children in the park.</td><td class="cn-sentence">公园里有很多孩子。</td></tr></tbody></table></div><div class="tip"><strong>小贴士：</strong>There is 后面接单数名词或不可数名词，There are 后面接复数名词。</div>'
    },
    { key: 'questions-grammar', title: '疑问句', icon: '&#x270D;', iconBg: 'bg-pink', type: 'grammar', chapter: '第五章 语法专题',
      content: '<p class="section-intro">特殊疑问句用疑问词开头，后面跟一般疑问句的语序。</p><div class="table-wrap"><table><thead><tr><th>英文</th><th>中文</th></tr></thead><tbody><tr><td class="en-sentence"><span class="highlight">What</span> is your name?</td><td class="cn-sentence">你叫什么名字？</td></tr><tr><td class="en-sentence"><span class="highlight">Where</span> is the cat?</td><td class="cn-sentence">猫在哪里？</td></tr><tr><td class="en-sentence"><span class="highlight">How many</span> books do you have?</td><td class="cn-sentence">你有多少本书？</td></tr><tr><td class="en-sentence"><span class="highlight">Who</span> is that boy?</td><td class="cn-sentence">那个男孩是谁？</td></tr><tr><td class="en-sentence"><span class="highlight">How old</span> are you?</td><td class="cn-sentence">你几岁了？</td></tr></tbody></table></div><div class="tip"><strong>小贴士：</strong>疑问词 + 一般疑问句 = 特殊疑问句。What 问什么，Where 问哪里，Who 问谁，How many 问多少，How old 问年龄。</div>'
    },
    { key: 'present-continuous', title: '现在进行时', icon: '&#x270D;', iconBg: 'bg-purple', type: 'grammar', chapter: '第五章 语法专题',
      content: '<p class="section-intro">现在进行时表示正在发生的动作，结构为 am/is/are + 动词 -ing。</p><div class="table-wrap"><table><thead><tr><th>英文</th><th>中文</th></tr></thead><tbody><tr><td class="en-sentence">I <span class="highlight">am reading</span> a book.</td><td class="cn-sentence">我正在读书。</td></tr><tr><td class="en-sentence">She <span class="highlight">is eating</span> an apple.</td><td class="cn-sentence">她正在吃苹果。</td></tr><tr><td class="en-sentence">They <span class="highlight">are playing</span> football.</td><td class="cn-sentence">他们正在踢足球。</td></tr><tr><td class="en-sentence">The cat <span class="highlight">is sleeping</span>.</td><td class="cn-sentence">猫正在睡觉。</td></tr><tr><td class="en-sentence">What are you <span class="highlight">doing</span>?</td><td class="cn-sentence">你正在做什么？</td></tr></tbody></table></div><div class="tip"><strong>小贴士：</strong>现在进行时由 be 动词 + 动词 -ing 构成。动词加 -ing 规则：直接加 -ing（play→playing）；去 e 加 -ing（ride→riding）；双写加 -ing（run→running）。</div>'
    },

      tip: '<strong>小贴士：</strong>everyone/everything/everybody 作主语时谓语用单数：Everyone is here. 不定代词 something/anything/nothing 后面的形容词放在后面：something nice。'
    },

    // ===== 第四章 语法进阶 =====

    // 15. 一般过去时 Past Simple
    { key: 'past-simple', title: '一般过去时 Past Simple', icon: '\u270D', iconBg: 'bg-yellow', type: 'grammar', chapter: '第四章 语法进阶',
      content: '<p class="section-intro">描述过去发生的事情，是 Movers 的核心语法。</p>' +
        '<div class="grammar-box"><div class="title">\u270D \u53E5\u578B\u7ED3\u6784</div>' +
        '<div class="formula">\u4E3B\u8BED + \u52A8\u8BCD\u8FC7\u53BB\u5F0F + \u5176\u4ED6</div>' +
        '<ul>' +
        '<li>\u80AF\u5B9A\u53E5\uFF1AI <strong>went</strong> to the park yesterday.</li>' +
        '<li>\u5426\u5B9A\u53E5\uFF1AI <strong>didn\'t go</strong> to the park.</li>' +
        '<li>\u7591\u95EE\u53E5\uFF1A<strong>Did</strong> you go to the park? \u2014 Yes, I did. / No, I didn\'t.</li>' +
        '<li>\u7279\u6B8A\u7591\u95EE\uFF1A<strong>What did</strong> you do yesterday?</li>' +
        '</ul></div>' +
        '<div class="table-wrap"><table>' +
        '<thead><tr><th>\u53E5\u578B</th><th>\u82F1\u6587\u4F8B\u53E5</th><th>\u4E2D\u6587</th></tr></thead>' +
        '<tbody>' +
        '<tr><td>\u80AF\u5B9A</td><td class="en-sentence">I <span class="highlight">watched</span> TV <span class="highlight">yesterday</span>.</td><td class="cn-sentence">\u6211\u6628\u5929\u770B\u4E86\u7535\u89C6\u3002</td></tr>' +
        '<tr><td>\u80AF\u5B9A</td><td class="en-sentence">She <span class="highlight">went</span> to the cinema <span class="highlight">last week</span>.</td><td class="cn-sentence">\u5979\u4E0A\u5468\u53BB\u4E86\u7535\u5F71\u9662\u3002</td></tr>' +
        '<tr><td>\u5426\u5B9A</td><td class="en-sentence">He <span class="highlight">didn\'t eat</span> breakfast this morning.</td><td class="cn-sentence">\u4ED6\u4ECA\u5929\u65E9\u4E0A\u6CA1\u5403\u65E9\u9910\u3002</td></tr>' +
        '<tr><td>\u5426\u5B9A</td><td class="en-sentence">We <span class="highlight">didn\'t play</span> football <span class="highlight">last Sunday</span>.</td><td class="cn-sentence">\u6211\u4EEC\u4E0A\u5468\u65E5\u6CA1\u8E22\u8DB3\u7403\u3002</td></tr>' +
        '<tr><td>\u7591\u95EE</td><td class="en-sentence"><span class="highlight">Did</span> you <span class="highlight">see</span> the film?</td><td class="cn-sentence">\u4F60\u770B\u90A3\u90E8\u7535\u5F71\u4E86\u5417\uFF1F</td></tr>' +
        '<tr><td>\u7279\u6B8A\u7591\u95EE</td><td class="en-sentence"><span class="highlight">Where did</span> you go <span class="highlight">yesterday</span>?</td><td class="cn-sentence">\u4F60\u6628\u5929\u53BB\u54EA\u513F\u4E86\uFF1F</td></tr>' +
        '<tr><td>\u7279\u6B8A\u7591\u95EE</td><td class="en-sentence"><span class="highlight">What did</span> she <span class="highlight">buy</span> <span class="highlight">last weekend</span>?</td><td class="cn-sentence">\u5979\u4E0A\u5468\u672B\u4E70\u4E86\u4EC0\u4E48\uFF1F</td></tr>' +
        '<tr><td>\u65F6\u95F4\u6807\u5FD7\u8BCD</td><td class="en-sentence"><span class="highlight">yesterday, last week, last month, two days ago, this morning</span></td><td class="cn-sentence">\u6628\u5929\u3001\u4E0A\u5468\u3001\u4E0A\u4E2A\u6708\u3001\u4E24\u5929\u524D\u3001\u4ECA\u5929\u65E9\u4E0A</td></tr>' +
        '</tbody></table></div>' +
        '<div class="tip"><strong>\u5C0F\u8D34\u58EB\uFF1A</strong>\u8FC7\u53BB\u65F6\u7684\u65F6\u95F4\u6807\u5FD7\u8BCD\u6709\uFF1Ayesterday\u3001last week/month/year\u3001... ago\u3001this morning\u3002didn\'t \u540E\u9762\u7528\u52A8\u8BCD\u539F\u5F62\uFF0C\u4E0D\u8981\u52A0 -ed\uFF01</div>'
    },

    // 16. 比较级和最高级 Comparatives & Superlatives
    { key: 'comparatives', title: '比较级和最高级 Comparatives', icon: '\u270D', iconBg: 'bg-yellow', type: 'grammar', chapter: '第四章 语法进阶',
      content: '<p class="section-intro">\u7528\u6BD4\u8F83\u7EA7\u6BD4\u8F83\u4E24\u4E2A\u4E8B\u7269\uFF0C\u7528\u6700\u9AD8\u7EA7\u8868\u793A\u6700\u2026\u2026\u3002</p>' +
        '<div class="grammar-box"><div class="title">\u270D \u53E5\u578B\u7ED3\u6784</div>' +
        '<div class="formula">A is <strong>\u6BD4\u8F83\u7EA7 + than</strong> B &nbsp;|&nbsp; A is <strong>the \u6700\u9AD8\u7EA7</strong></div>' +
        '<ul>' +
        '<li>\u77ED\u5F62\u5BB9\u8BCD\uFF1A\u52A0 -er / -est\uFF08big \u2192 bigger \u2192 biggest\uFF09</li>' +
        '<li>\u957F\u5F62\u5BB9\u8BCD\uFF1A\u52A0 more / most\uFF08beautiful \u2192 more beautiful\uFF09</li>' +
        '<li>\u4E0D\u89C4\u5219\uFF1Agood \u2192 better \u2192 best\uFF0Cbad \u2192 worse \u2192 worst</li>' +
        '</ul></div>' +
        '<div class="table-wrap"><table>' +
        '<thead><tr><th>\u539F\u7EA7</th><th>\u6BD4\u8F83\u7EA7</th><th>\u6700\u9AD8\u7EA7</th><th>\u4F8B\u53E5</th></tr></thead>' +
        '<tbody>' +
        '<tr><td>big</td><td><span class="highlight">bigger</span></td><td>the <span class="highlight">biggest</span></td><td class="en-sentence">An elephant is <span class="highlight">bigger than</span> a mouse.</td></tr>' +
        '<tr><td>tall</td><td><span class="highlight">taller</span></td><td>the <span class="highlight">tallest</span></td><td class="en-sentence">She is the <span class="highlight">tallest</span> girl in our class.</td></tr>' +
        '<tr><td>good</td><td><span class="highlight">better</span></td><td>the <span class="highlight">best</span></td><td class="en-sentence">This book is <span class="highlight">better</span> than that one.</td></tr>' +
        '<tr><td>bad</td><td><span class="highlight">worse</span></td><td>the <span class="highlight">worst</span></td><td class="en-sentence">That was the <span class="highlight">worst</span> day of my life.</td></tr>' +
        '<tr><td>happy</td><td><span class="highlight">happier</span></td><td>the <span class="highlight">happiest</span></td><td class="en-sentence">Today I am <span class="highlight">happier</span> than yesterday.</td></tr>' +
        '<tr><td>beautiful</td><td><span class="highlight">more beautiful</span></td><td>the <span class="highlight">most beautiful</span></td><td class="en-sentence">This is the <span class="highlight">most beautiful</span> flower.</td></tr>' +
        '</tbody></table></div>' +
        '<div class="tip"><strong>\u5C0F\u8D34\u58EB\uFF1A</strong>\u6BD4\u8F83\u7EA7\u540E\u9762\u8981\u52A0 than\uFF0C\u6700\u9AD8\u7EA7\u524D\u901A\u5E38\u52A0 the\u3002\u53CC\u5199\u8F85\u97F3\u5B57\u6BCD\u7ED3\u5C3E\u7684\u5148\u53CC\u5199\u518D\u52A0 -er/-est\uFF08big \u2192 bigger\uFF09\u3002</div>'
    },

    // 17. 副词比较 Adverb Comparison
    { key: 'adverb-comparison', title: '副词比较 Adverb Comparison', icon: '\u270D', iconBg: 'bg-yellow', type: 'grammar', chapter: '第四章 语法进阶',
      content: '<p class="section-intro">\u526F\u8BCD\u4E5F\u6709\u6BD4\u8F83\u7EA7\u548C\u6700\u9AD8\u7EA7\uFF0C\u7528\u6765\u6BD4\u8F83\u52A8\u4F5C\u7684\u65B9\u5F0F\u3002</p>' +
        '<div class="grammar-box"><div class="title">\u270D \u53E5\u578B\u7ED3\u6784</div>' +
        '<div class="formula">\u52A8\u4F5C + <strong>\u526F\u8BCD\u6BD4\u8F83\u7EA7 + than</strong> &nbsp;|&nbsp; \u52A8\u4F5C + <strong>\u526F\u8BCD\u6700\u9AD8\u7EA7</strong></div>' +
        '<ul>' +
        '<li>\u77ED\u526F\u8BCD\uFF1A\u52A0 -er / -est\uFF08fast \u2192 faster \u2192 fastest\uFF09</li>' +
        '<li>\u957F\u526F\u8BCD\uFF1A\u52A0 more / most\uFF08quickly \u2192 more quickly\uFF09</li>' +
        '<li>\u4E0D\u89C4\u5219\uFF1Awell \u2192 better \u2192 best\uFF0Cbadly \u2192 worse \u2192 worst</li>' +
        '</ul></div>' +
        '<div class="table-wrap"><table>' +
        '<thead><tr><th>\u539F\u7EA7</th><th>\u6BD4\u8F83\u7EA7</th><th>\u6700\u9AD8\u7EA7</th><th>\u4F8B\u53E5</th></tr></thead>' +
        '<tbody>' +
        '<tr><td>fast</td><td><span class="highlight">faster</span></td><td>(the) <span class="highlight">fastest</span></td><td class="en-sentence">She runs <span class="highlight">faster</span> than me.</td></tr>' +
        '<tr><td>quickly</td><td><span class="highlight">more quickly</span></td><td>(the) <span class="highlight">most quickly</span></td><td class="en-sentence">He finished <span class="highlight">more quickly</span> than before.</td></tr>' +
        '<tr><td>well</td><td><span class="highlight">better</span></td><td>(the) <span class="highlight">best</span></td><td class="en-sentence">You sing <span class="highlight">better</span> than your sister.</td></tr>' +
        '<tr><td>badly</td><td><span class="highlight">worse</span></td><td>(the) <span class="highlight">worst</span></td><td class="en-sentence">He played <span class="highlight">worst</span> in the team.</td></tr>' +
        '</tbody></table></div>' +
        '<div class="tip"><strong>\u5C0F\u8D34\u58EB\uFF1A</strong>\u526F\u8BCD\u6700\u9AD8\u7EA7\u524D\u7684 the \u53EF\u4EE5\u7701\u7565\u3002hard \u2192 harder \u2192 hardest\uFF08\u6CE8\u610F\u4E0D\u662F hardly\uFF0Chardly \u610F\u601D\u662F\u201C\u51E0\u4E4E\u4E0D\u201D\uFF09\u3002</div>'
    },

    // 18. 情态动词 Must / Have to / Shall / Could
    { key: 'must-have-to', title: '情态动词 Modal Verbs', icon: '\u270D', iconBg: 'bg-yellow', type: 'grammar', chapter: '第四章 语法进阶',
      content: '<p class="section-intro">\u60C5\u6001\u52A8\u8BCD\u8868\u793A\u5FC5\u987B\u3001\u5EFA\u8BAE\u3001\u8BF7\u6C42\u7B49\u8BED\u6C14\u3002</p>' +
        '<div class="grammar-box"><div class="title">\u270D \u53E5\u578B\u7ED3\u6784</div>' +
        '<div class="formula"><strong>must</strong> + \u52A8\u8BCD\u539F\u5F62 \uFF08\u5FC5\u987B\uFF09 &nbsp;|&nbsp; <strong>have to</strong> + \u52A8\u8BCD\u539F\u5F62 \uFF08\u4E0D\u5F97\u4E0D\uFF09</div>' +
        '<ul>' +
        '<li><strong>must</strong>\uFF1A\u8868\u793A\u5FC5\u987B\u3001\u4E00\u5B9A\u8981\uFF08Must I go? \u2014 Yes, you must.\uFF09</li>' +
        '<li><strong>have to</strong>\uFF1A\u8868\u793A\u5BA2\u89C2\u4E0A\u4E0D\u5F97\u4E0D\u505A\u7684\u4E8B</li>' +
        '<li><strong>shall</strong>\uFF1A\u63D0\u5EFA\u8BAE\uFF08Shall we go?\uFF09</li>' +
        '<li><strong>could</strong>\uFF1A\u59D4\u5A49\u8BF7\u6C42\uFF08Could you help me?\uFF09</li>' +
        '</ul></div>' +
        '<div class="table-wrap"><table>' +
        '<thead><tr><th>\u60C5\u6001\u52A8\u8BCD</th><th>\u82F1\u6587\u4F8B\u53E5</th><th>\u4E2D\u6587</th></tr></thead>' +
        '<tbody>' +
        '<tr><td><span class="highlight">must</span></td><td class="en-sentence">You <span class="highlight">must</span> do your homework.</td><td class="cn-sentence">\u4F60\u5FC5\u987B\u505A\u4F5C\u4E1A\u3002</td></tr>' +
        '<tr><td><span class="highlight">mustn\'t</span></td><td class="en-sentence">You <span class="highlight">mustn\'t</span> run in the corridor.</td><td class="cn-sentence">\u4F60\u4E0D\u80FD\u5728\u8D70\u5ECA\u91CC\u8DD1\u3002</td></tr>' +
        '<tr><td><span class="highlight">have to</span></td><td class="en-sentence">I <span class="highlight">have to</span> get up early on Monday.</td><td class="cn-sentence">\u661F\u671F\u4E00\u6211\u4E0D\u5F97\u4E0D\u65E9\u8D77\u3002</td></tr>' +
        '<tr><td><span class="highlight">shall</span></td><td class="en-sentence"><span class="highlight">Shall</span> we go swimming?</td><td class="cn-sentence">\u6211\u4EEC\u53BB\u6E38\u6CF3\u597D\u5417\uFF1F</td></tr>' +
        '<tr><td><span class="highlight">could</span></td><td class="en-sentence"><span class="highlight">Could</span> you open the window, please?</td><td class="cn-sentence">\u8BF7\u4F60\u6253\u5F00\u7A97\u6237\u597D\u5417\uFF1F</td></tr>' +
        '<tr><td><span class="highlight">can\'t</span></td><td class="en-sentence">She <span class="highlight">can\'t</span> come to the party.</td><td class="cn-sentence">\u5979\u4E0D\u80FD\u6765\u53C2\u52A0\u6D3E\u5BF9\u3002</td></tr>' +
        '</tbody></table></div>' +
        '<div class="tip"><strong>\u5C0F\u8D34\u58EB\uFF1A</strong>must \u8868\u793A\u8BF4\u8BDD\u4EBA\u8BA4\u4E3A\u7684\u5FC5\u987B\uFF0Chave to \u8868\u793A\u5916\u754C\u89C4\u5B9A\u7684\u5FC5\u987B\u3002mustn\'t \u8868\u793A\u7981\u6B62\uFF08\u4E0D\u5F97\uFF09\uFF0C\u800C don\'t have to \u8868\u793A\u4E0D\u9700\u8981\u3002</div>'
    },

    // 19. 动词不定式 Verb + Infinitive
    { key: 'verb-infinitive', title: '动词不定式 Verb + Infinitive', icon: '\u270D', iconBg: 'bg-yellow', type: 'grammar', chapter: '第四章 语法进阶',
      content: '<p class="section-intro">\u67D0\u4E9B\u52A8\u8BCD\u540E\u9762\u8981\u63A5 to + \u52A8\u8BCD\u539F\u5F62\uFF0C\u6784\u6210\u52A8\u8BCD\u4E0D\u5B9A\u5F0F\u3002</p>' +
        '<div class="grammar-box"><div class="title">\u270D \u5E38\u89C1\u642D\u914D</div>' +
        '<div class="formula"><strong>want to</strong> / <strong>start to</strong> / <strong>like to</strong> / <strong>ask sb to</strong> / <strong>would like to</strong></div>' +
        '<ul>' +
        '<li><strong>want to do</strong>\uFF1A\u60F3\u505A\u67D0\u4E8B</li>' +
        '<li><strong>start to do</strong>\uFF1A\u5F00\u59CB\u505A\u67D0\u4E8B</li>' +
        '<li><strong>ask sb to do</strong>\uFF1A\u8BF7\u6C42\u67D0\u4EBA\u505A\u67D0\u4E8B</li>' +
        '<li><strong>would like to do</strong>\uFF1A\u60F3\u8981\u505A\u67D0\u4E8B\uFF08\u66F4\u793C\u8C8C\uFF09</li>' +
        '</ul></div>' +
        '<div class="table-wrap"><table>' +
        '<thead><tr><th>\u7ED3\u6784</th><th>\u82F1\u6587\u4F8B\u53E5</th><th>\u4E2D\u6587</th></tr></thead>' +
        '<tbody>' +
        '<tr><td>want to</td><td class="en-sentence">I <span class="highlight">want to</span> learn how to swim.</td><td class="cn-sentence">\u6211\u60F3\u5B66\u6E38\u6CF3\u3002</td></tr>' +
        '<tr><td>would like to</td><td class="en-sentence">She <span class="highlight">would like to</span> drink some juice.</td><td class="cn-sentence">\u5979\u60F3\u559D\u4E9B\u679C\u6C41\u3002</td></tr>' +
        '<tr><td>start to</td><td class="en-sentence">They <span class="highlight">started to</span> play football at 3 o\'clock.</td><td class="cn-sentence">\u4ED6\u4EEC\u4E09\u70B9\u5F00\u59CB\u8E22\u8DB3\u7403\u3002</td></tr>' +
        '<tr><td>ask sb to</td><td class="en-sentence">Mum <span class="highlight">asked me to</span> clean my room.</td><td class="cn-sentence">\u5988\u5988\u8BA9\u6211\u6253\u626B\u6211\u7684\u623F\u95F4\u3002</td></tr>' +
        '<tr><td>like to</td><td class="en-sentence">I <span class="highlight">like to</span> read books before bed.</td><td class="cn-sentence">\u6211\u559C\u6B22\u7761\u524D\u770B\u4E66\u3002</td></tr>' +
        '</tbody></table></div>' +
        '<div class="tip"><strong>\u5C0F\u8D34\u58EB\uFF1A</strong>ask sb <strong>to</strong> do sth \u4E2D\u7684 to \u4E0D\u80FD\u7701\u7565\u3002want \u540E\u9762\u8981\u52A0 to\uFF0C\u4F46 like \u540E\u9762\u65E2\u53EF\u4EE5\u52A0 to \u4E5F\u53EF\u4EE5\u52A0 -ing\u3002</div>'
    },

    // 20. 关系从句 Relative Clauses
    { key: 'relative-clauses', title: '关系从句 Relative Clauses', icon: '\u270D', iconBg: 'bg-yellow', type: 'grammar', chapter: '第四章 语法进阶',
      content: '<p class="section-intro">\u7528 who\u3001which\u3001where \u5F15\u5BFC\u7684\u5B9A\u8BED\u4ECE\u53E5\uFF0C\u7528\u6765\u8865\u5145\u8BF4\u660E\u540D\u8BCD\u3002</p>' +
        '<div class="grammar-box"><div class="title">\u270D \u5173\u7CFB\u4EE3\u8BCD\u7528\u6CD5</div>' +
        '<div class="formula"><strong>who</strong> \u2192 \u4EBA &nbsp;|&nbsp; <strong>which</strong> \u2192 \u7269 &nbsp;|&nbsp; <strong>where</strong> \u2192 \u5730\u70B9</div>' +
        '<ul>' +
        '<li><strong>who</strong>\uFF1A\u4FEE\u9970\u4EBA\uFF08The boy <strong>who</strong> is wearing a red shirt \u2026\uFF09</li>' +
        '<li><strong>which</strong>\uFF1A\u4FEE\u9970\u7269\uFF08The book <strong>which</strong> is on the table \u2026\uFF09</li>' +
        '<li><strong>where</strong>\uFF1A\u4FEE\u9970\u5730\u70B9\uFF08The park <strong>where</strong> we play \u2026\uFF09</li>' +
        '</ul></div>' +
        '<div class="table-wrap"><table>' +
        '<thead><tr><th>\u5173\u7CFB\u8BCD</th><th>\u82F1\u6587\u4F8B\u53E5</th><th>\u4E2D\u6587</th></tr></thead>' +
        '<tbody>' +
        '<tr><td><span class="highlight">who</span></td><td class="en-sentence">The girl <span class="highlight">who</span> is reading a book is my friend.</td><td class="cn-sentence">\u90A3\u4E2A\u6B63\u5728\u770B\u4E66\u7684\u5973\u5B69\u662F\u6211\u7684\u670B\u53CB\u3002</td></tr>' +
        '<tr><td><span class="highlight">who</span></td><td class="en-sentence">The man <span class="highlight">who</span> lives next door is a teacher.</td><td class="cn-sentence">\u4F4F\u5728\u9694壁\u7684\u90A3\u4E2A\u7537\u4EBA\u662F\u4E00\u540D\u8001\u5E08\u3002</td></tr>' +
