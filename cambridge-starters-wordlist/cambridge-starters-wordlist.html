    // ================================================================
    // 2. DERIVED DATA
    // ================================================================

    // Get chapters for a phase
    function getChapters(phase) {
      if (phase === 'movers') return CHAPTERS_MOVERS;
      return CHAPTERS_STARTERS;
    }

    // Build chapter groups (chapters grouped by their .chapter field)
    function getChapterGroups(chapters) {
      var groups = [];
      var map = {};
      var order = [];
      chapters.forEach(function(ch) {
        var chName = ch.chapter || '其他';
        if (!map[chName]) {
          map[chName] = [];
          order.push(chName);
        }
        map[chName].push(ch);
      });
      order.forEach(function(name) {
        groups.push({ name: name, chapters: map[name] });
      });
      return groups;
    }

    // Build groupNames map from chapter data
    function buildGroupNames(chapters) {
      var names = {};
      chapters.forEach(function(ch) {
        if (ch.type === 'vocab' && ch.groups) {
          ch.groups.forEach(function(g) {
            names[g.id] = g.label || g.id;
          });
        }
      });
      return names;
    }

    // Build groupMap from chapter data (counts)
    function buildGroupMap(chapters) {
      var map = {};
      var total = 0;
      chapters.forEach(function(ch) {
        if (ch.type === 'vocab' && ch.groups) {
          ch.groups.forEach(function(g) {
            var count = g.words ? g.words.length : 0;
            map[g.id] = { total: count, mastered: 0 };
            total += count;
          });
        }
      });
      return { map: map, total: total };
    }

    // Collect all word-group IDs in order
    function buildGroupOrder(chapters) {
      var order = [];
      chapters.forEach(function(ch) {
        if (ch.type === 'vocab' && ch.groups) {
          ch.groups.forEach(function(g) {
            order.push(g.id);
          });
        }
      });
      return order;
    }

    // ================================================================
    // 3. RENDER MODULE
    // ================================================================

    function renderTOC(phase) {
      var chapters = getChapters(phase);
      var groups = getChapterGroups(chapters);
      var phaseInfo = PHASES[phase];

      var html = '';
      groups.forEach(function(grp) {
        html += '<div class="toc-chap">' + grp.name + '</div>';
        html += '<div class="toc-items">';
        grp.chapters.forEach(function(ch) {
          var isActive = (ch.key === currentChapterKey) ? ' active' : '';
          html += '<a href="#" class="' + isActive + '" data-chapter="' + ch.key + '" onclick="showChapter(\'' + ch.key + '\');return false;">' + ch.title.split(' ')[0] + '</a>';
        });
        html += '</div>';
      });

      document.getElementById('toc-content').innerHTML = html;
      document.getElementById('toc-header-text').innerHTML = '&#x1F4D6; ' + phaseInfo.label + ' 目录';
    }

    function renderChapterNav(phase) {
      var chapters = getChapters(phase);
      var groups = getChapterGroups(chapters);
      var nav = document.getElementById('chapter-nav');

      var html = '';
      groups.forEach(function(grp) {
        grp.chapters.forEach(function(ch) {
          var isActive = (ch.key === currentChapterKey) ? ' active' : '';
          var shortTitle = ch.title.replace(/^.*?\s+/, '').split(' ')[0] || ch.title.split(' ')[0];
          html += '<a href="#" class="' + isActive + '" onclick="showChapter(\'' + ch.key + '\');return false;">' + shortTitle + '</a>';
        });
      });

      nav.innerHTML = html;
    }

    function renderBreadcrumb(items) {
      var area = document.getElementById('breadcrumb-area');
      if (!items || items.length === 0) { area.innerHTML = ''; return; }
      var html = '';
      items.forEach(function(item, idx) {
        if (idx > 0) html += '<span class="sep">\u203A</span>';
        if (idx === items.length - 1) {
          html += '<span class="current">' + item.label + '</span>';
        } else if (item.action) {
          html += '<a href="#" onclick="' + item.action + ';return false;">' + item.label + '</a>';
        } else {
          html += '<span>' + item.label + '</span>';
        }
      });
      area.innerHTML = '<div class="breadcrumb">' + html + '</div>';
    }

    function renderWordCard(w) {
      return '<div class="word-card" data-word="' + w.word + '">'
        + '<span class="master-check">&#10003;</span>'
        + '<div class="en">' + w.word + ' <button class="speak-btn" onclick="event.stopPropagation();speak(\'' + w.word.replace(/'/g, "\\'") + '\')">&#x1F50A;</button></div>'
        + '<div class="phonetic">' + (w.phonetic || '') + '</div>'
        + '<div class="cn">' + (w.cn || '') + '</div>'
        + '</div>';
    }

    function renderWordGrid(words, groupId) {
      return '<div class="word-grid" data-group="' + groupId + '">'
        + words.map(renderWordCard).join('')
        + '</div>';
    }

    function renderGrammarSection(content) {
      return '<div class="grammar-table-wrap">' + content + '</div>';
    }

    function renderChapterPage(chapterKey) {
      var chapters = getChapters(currentPhase);
      var ch = null;
      for (var i = 0; i < chapters.length; i++) {
        if (chapters[i].key === chapterKey) { ch = chapters[i]; break; }
      }
      if (!ch) {
        document.getElementById('english-content').innerHTML = '<p style="color:var(--muted);text-align:center;padding:2rem;">章节未找到</p>';
        return;
      }

      // Breadcrumb
      var phaseInfo = PHASES[currentPhase];
      renderBreadcrumb([
        { label: phaseInfo.label, action: "switchPhase('" + currentPhase + "')" },
        { label: ch.chapter || '', action: "showChapter('" + chapterKey + "')" },
        { label: ch.title }
      ]);

      var html = '<div class="chapter-page" id="chapter-page-' + chapterKey + '">';

      // Chapter header (if it's the first chapter in a chapter group)
      if (ch.chapter) {
        var chaptersInGroup = chapters.filter(function(c) { return c.chapter === ch.chapter; });
        if (chaptersInGroup[0] && chaptersInGroup[0].key === chapterKey) {
          html += '<div class="chapter-header"><span class="chap-icon">' + (ch.icon || '') + '</span><span class="chap-num">' + ch.chapter.split(' ')[0] + '</span>' + ch.chapter.replace(/^[^\s]+\s/, '') + '</div>';
        }
      }

      // Section title
      html += '<section id="' + chapterKey + '">';
      html += '<h2><span class="icon ' + (ch.iconBg || 'bg-blue') + '">' + (ch.icon || '') + '</span>' + ch.title + '</h2>';

      if (ch.type === 'vocab') {
        // Vocabulary chapter
        if (ch.intro) html += '<p class="section-intro">' + ch.intro + '</p>';

        if (ch.groups) {
          ch.groups.forEach(function(g) {
            if (g.label) html += '<div class="group-header"><h3>' + g.label + '</h3>'
              + '<div class="filter-group">'
              + '<button class="filter-btn active" data-filter="all" onclick="filterWords(this,\'all\')">全部</button>'
              + '<button class="filter-btn" data-filter="unmastered" onclick="filterWords(this,\'unmastered\')">未掌握</button>'
              + '<button class="filter-btn" data-filter="mastered" onclick="filterWords(this,\'mastered\')">已掌握</button>'
              + '</div></div>';
            if (g.words && g.words.length > 0) {
              html += renderWordGrid(g.words, g.id);
            }
          });
        }

        // Sentences
        if (ch.sentences && ch.sentences.length > 0) {
          html += '<h3>例句</h3>';
          html += '<div class="table-wrap"><table><thead><tr><th>英文</th><th>中文</th></tr></thead><tbody>';
          ch.sentences.forEach(function(s) {
            html += '<tr><td class="en-sentence">' + s.en + '</td><td class="cn-sentence">' + s.cn + '</td></tr>';
          });
          html += '</tbody></table></div>';
        }

        // Tip
        if (ch.tip) html += '<div class="tip">' + ch.tip + '</div>';
      } else if (ch.type === 'grammar') {
        // Grammar chapter
        if (ch.intro) html += '<p class="section-intro">' + ch.intro + '</p>';
        if (ch.content) html += renderGrammarSection(ch.content);
      }

      html += '</section>';
      html += '</div>';

      document.getElementById('english-content').innerHTML = html;

      // After rendering, apply mastered state and update progress
      applyMasteredState();
      rebuildProgressBars();
      loadProgressFromServer();
    }

    function renderAllChapters(phase) {
      var chapters = getChapters(phase);
      var groups = getChapterGroups(chapters);
      var phaseInfo = PHASES[phase];

      renderBreadcrumb([{ label: phaseInfo.label + ' 全部内容' }]);

      var html = '';
      groups.forEach(function(grp) {
        html += '<div class="chapter-header"><span class="chap-icon">&#x1F3AF;</span><span class="chap-num">' + grp.name.split(' ')[0] + '</span>' + grp.name.replace(/^[^\s]+\s/, '') + '</div>';
        grp.chapters.forEach(function(ch) {
          html += '<div class="chapter-page">';
          html += '<section id="' + ch.key + '">';
          html += '<h2><span class="icon ' + (ch.iconBg || 'bg-blue') + '">' + (ch.icon || '') + '</span>' + ch.title + '</h2>';

          if (ch.type === 'vocab') {
            if (ch.intro) html += '<p class="section-intro">' + ch.intro + '</p>';
            if (ch.groups) {
              ch.groups.forEach(function(g) {
                if (g.label) html += '<div class="group-header"><h3>' + g.label + '</h3>'
                  + '<div class="filter-group">'
                  + '<button class="filter-btn active" data-filter="all" onclick="filterWords(this,\'all\')">全部</button>'
                  + '<button class="filter-btn" data-filter="unmastered" onclick="filterWords(this,\'unmastered\')">未掌握</button>'
                  + '<button class="filter-btn" data-filter="mastered" onclick="filterWords(this,\'mastered\')">已掌握</button>'
                  + '</div></div>';
                if (g.words && g.words.length > 0) {
                  html += renderWordGrid(g.words, g.id);
                }
              });
            }
            if (ch.sentences && ch.sentences.length > 0) {
              html += '<h3>例句</h3>';
              html += '<div class="table-wrap"><table><thead><tr><th>英文</th><th>中文</th></tr></thead><tbody>';
              ch.sentences.forEach(function(s) {
                html += '<tr><td class="en-sentence">' + s.en + '</td><td class="cn-sentence">' + s.cn + '</td></tr>';
              });
              html += '</tbody></table></div>';
            }
            if (ch.tip) html += '<div class="tip">' + ch.tip + '</div>';
          } else if (ch.type === 'grammar') {
            if (ch.intro) html += '<p class="section-intro">' + ch.intro + '</p>';
            if (ch.content) html += renderGrammarSection(ch.content);
          }

          html += '</section>';
          html += '</div>';
        });
      });

      document.getElementById('english-content').innerHTML = html;
      currentChapterKey = null;

      // Apply mastered state and update progress
      applyMasteredState();
      rebuildProgressBars();
      loadProgressFromServer();
    }

    // ================================================================
    // 4. NAVIGATION MODULE
    // ================================================================

    function toggleTocSidebar() {
      document.getElementById('toc-sidebar').classList.toggle('open');
      document.getElementById('toc-overlay').classList.toggle('open');
    }
    function closeToc() {
      document.getElementById('toc-sidebar').classList.remove('open');
      document.getElementById('toc-overlay').classList.remove('open');
    }

    function switchPhase(phase) {
      currentPhase = phase;
      currentChapterKey = null;
      localStorage.setItem('cam_learn_phase', currentPhase);
      localStorage.setItem('cam_learn_chapter', '');

      // Update stage tabs
      document.querySelectorAll('#stage-tabs .stage-tab').forEach(function(tab) {
        var tabPhase = tab.getAttribute('data-phase');
        var tabPage = tab.getAttribute('data-page');
        if (tabPage === 'english') {
          tab.classList.toggle('active', tabPhase === phase);
        }
      });

      // Show english page
      showPage('english');

      // Re-render nav and TOC
      renderChapterNav(phase);
      renderTOC(phase);

      // Render all chapters for this phase
      renderAllChapters(phase);

      // Open TOC on desktop
      if (window.innerWidth >= 900) {
        document.getElementById('toc-sidebar').classList.add('open');
      }

      window.scrollTo(0, 0);
    }

    function showChapter(chapterKey) {
      currentChapterKey = chapterKey;
      localStorage.setItem('cam_learn_phase', currentPhase);
      localStorage.setItem('cam_learn_chapter', chapterKey);
      closeToc();

      // Update chapter nav active
      document.querySelectorAll('#chapter-nav a').forEach(function(a) {
        a.classList.toggle('active', a.getAttribute('onclick') && a.getAttribute('onclick').indexOf("'" + chapterKey + "'") !== -1);
      });

      // Update TOC active
      document.querySelectorAll('#toc-content a').forEach(function(a) {
        a.classList.toggle('active', a.getAttribute('data-chapter') === chapterKey);
      });

      // Render the chapter
      renderChapterPage(chapterKey);

      window.scrollTo(0, 0);
    }

    function showPage(page) {
      document.querySelectorAll('.page-section').forEach(function(el) {
        el.style.display = 'none';
      });
      var target = document.getElementById('page-' + page);
      if (target) {
        target.style.display = 'block';
        target.style.animation = 'none';
        target.offsetHeight;
        target.style.animation = '';
      }
      window.scrollTo(0, 0);
      currentPage = page;

      // Show/hide chapter nav (only for english)
      var chapterNav = document.getElementById('chapter-nav');
      var fab = document.getElementById('toc-fab');
      var sidebar = document.getElementById('toc-sidebar');

      if (page === 'english') {
        chapterNav.style.display = 'flex';
        if (fab) fab.classList.remove('hide');
        if (window.innerWidth >= 900 && sidebar) sidebar.classList.add('open');
        document.querySelector('.content.page-content-with-toc').classList.add('toc-visible');
      } else {
        chapterNav.style.display = 'none';
        if (fab) fab.classList.add('hide');
        if (sidebar) sidebar.classList.remove('open');
        document.querySelector('.content.page-content-with-toc').classList.remove('toc-visible');
        closeToc();
      }

      // Update stage tabs active state
      document.querySelectorAll('#stage-tabs .stage-tab').forEach(function(tab) {
        var tabPage = tab.getAttribute('data-page');
        tab.classList.toggle('active',
          (page === 'english' && tabPage === 'english' && tab.getAttribute('data-phase') === currentPhase) ||
          (page !== 'english' && tabPage === page)
        );
      });

      if (page === 'dashboard') loadDashboard();
      if (page === 'tasks') { loadTaskManager(); fetchTodayTasks(); }
      if (page === 'math') stopMathTimer();
    }

    // ================================================================
    // 5. PROGRESS MODULE
    // ================================================================

    var groupMap = {};
    var groupOrder = [];
    var groupNames = {};
    var totalWords = 0;
    var barColors = ['var(--accent)', 'var(--accent2)', 'var(--green)', 'var(--pink)', 'var(--purple)'];

    function rebuildProgressBars() {
      var chapters = getChapters(currentPhase);
      var built = buildGroupMap(chapters);
      groupMap = built.map;
      totalWords = built.total;
      groupOrder = buildGroupOrder(chapters);
      groupNames = buildGroupNames(chapters);

      var area = document.getElementById('progress-area');
      var areaHTML = '';
      var colorIdx = 0;
      groupOrder.forEach(function(gid) {
        var name = groupNames[gid] || gid;
        var color = barColors[colorIdx % barColors.length];
        areaHTML += '<div class="progress-row"><span class="progress-label">' + name + '</span>'
          + '<div class="progress-bar"><div class="progress-fill" id="pf-' + gid + '" style="width:0%;background:' + color + '"></div></div>'
          + '<span class="progress-count" id="pc-' + gid + '">0/' + groupMap[gid].total + '</span></div>';
        colorIdx++;
      });
      area.innerHTML = areaHTML;

      // Cache DOM refs
      groupOrder.forEach(function(gid) {
        groupMap[gid].fillEl = document.getElementById('pf-' + gid);
        groupMap[gid].countEl = document.getElementById('pc-' + gid);
      });
    }

    function updateBars() {
      var tm = 0;
      groupOrder.forEach(function(gid) {
        var g = groupMap[gid];
        if (!g) return;
        var grid = document.querySelector('.word-grid[data-group="' + gid + '"]');
        var m = grid ? grid.querySelectorAll('.word-card.mastered').length : 0;
        g.mastered = m;
        tm += m;
        var pct = g.total > 0 ? Math.round(m / g.total * 100) : 0;
        if (g.fillEl) g.fillEl.style.width = pct + '%';
        if (g.countEl) g.countEl.textContent = m + '/' + g.total;
      });
      var totalEl = document.getElementById('progress-total');
      if (totalEl) {
        var pctTotal = totalWords > 0 ? Math.round(tm / totalWords * 100) : 0;
        totalEl.textContent = '总进度：' + tm + ' / ' + totalWords + ' 个单词已掌握（' + pctTotal + '%）';
      }
    }

    function applyMasteredState() {
      // Re-apply mastered class from cached data (if already loaded)
      // Will be fully updated by loadProgressFromServer
    }

    function loadProgressFromServer() {
      fetch(API + '/progress')
        .then(function(r) { return r.json(); })
        .then(function(data) {
          var mastered = data.mastered || {};
          document.querySelectorAll('.word-card').forEach(function(card) {
            var word = card.getAttribute('data-word');
            if (mastered[word]) { card.classList.add('mastered'); }
          });
          updateBars();
          ready = true;
        })
        .catch(function(err) {
          console.warn('Failed to load progress from server, starting empty.', err);
          updateBars();
          ready = true;
        });
    }

    // ================================================================
    // 6. TOAST SYSTEM
    // ================================================================

    function showToast(msg, type, duration) {
      type = type || 'info';
      duration = duration || 2500;
      var container = document.getElementById('toast-container');
      var t = document.createElement('div');
      t.className = 'toast ' + type;
      var icons = { success: '\u2714', error: '\u2718', info: '\u2139', warn: '\u26A0' };
      t.innerHTML = '<span>' + (icons[type] || '') + '</span><span>' + msg + '</span>';
      container.appendChild(t);
      setTimeout(function() {
        t.classList.add('out');
        setTimeout(function() { t.remove(); }, 300);
      }, duration);
    }

    // ================================================================
    // 7. VOICE (TTS)
    // ================================================================

    function initVoice() {
      var voices = speechSynthesis.getVoices();
      if (!voices.length) return;
      ukVoice = voices.find(function(v) { return v.lang === 'en-GB' || v.lang === 'en_GB'; })
             || voices.find(function(v) { return /en.*GB/i.test(v.lang); })
             || voices.find(function(v) { return v.lang.indexOf('en') === 0; });
    }
    if (speechSynthesis.onvoiceschanged !== undefined) speechSynthesis.onvoiceschanged = initVoice;
    initVoice();

    window.speak = function(text) {
      if (!('speechSynthesis' in window)) return;
      speechSynthesis.cancel();
      var u = new SpeechSynthesisUtterance(text);
      u.lang = 'en-GB'; u.rate = 0.85; u.pitch = 1.05;
      if (ukVoice) u.voice = ukVoice;
      speechSynthesis.speak(u);
    };

    // ================================================================
    // 8. EVENT DELEGATION (word card click)
    // ================================================================

    document.addEventListener('click', function(e) {
      var card = e.target.closest('.word-card');
      if (!card) return;
      if (e.target.closest('.speak-btn')) return;

      var word = card.getAttribute('data-word');
      var grid = card.closest('.word-grid[data-group]');
      var groupId = grid ? grid.getAttribute('data-group') : '';

      // Optimistic UI update
      var wasMastered = card.classList.contains('mastered');
      if (wasMastered) {
        card.classList.remove('mastered');
      } else {
        card.classList.add('mastered');
        speak(word);
      }
      updateBars();

      // Send to server
      fetch(API + '/progress/toggle', {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ word: word, group: groupId })
      }).then(function(r) {
        if (!r.ok) {
          if (wasMastered) { card.classList.add('mastered'); }
          else { card.classList.remove('mastered'); }
          updateBars();
        }
      }).catch(function() {
        if (wasMastered) { card.classList.add('mastered'); }
        else { card.classList.remove('mastered'); }
        updateBars();
      });

      // Auto check-in task
      autoCheckin('english', 'vocab', 1);
    });

    // ================================================================
    // 9. RESET
    // ================================================================

    window.resetProgress = function() {
      if (confirm('确定要重置全部学习进度吗？')) {
        fetch(API + '/progress', { method: 'DELETE' })
          .then(function() {
            document.querySelectorAll('.word-card.mastered').forEach(function(c) { c.classList.remove('mastered'); });
            updateBars();
          })
          .catch(function() { showToast('重置失败，请检查服务器连接', 'error'); });
      }
    };

    // ================================================================
    // 10. AUTO TASK CHECK-IN
    // ================================================================

    var todayTasks = [];
    function fetchTodayTasks() {
      var today = new Date().toISOString().slice(0, 10);
      fetch(API + '/tasks?date=' + today)
        .then(function(r) { return r.json(); })
        .then(function(d) { todayTasks = d.tasks || []; })
        .catch(function() {});
    }
    fetchTodayTasks();

    function autoCheckin(subject, taskType, count) {
      var candidates = todayTasks.filter(function(t) {
        return t.status !== 'completed' && t.subject === subject && t.task_type === taskType;
      });
      if (candidates.length === 0) return;
      candidates.sort(function(a, b) {
        return (a.completed_count / a.target_count) - (b.completed_count / b.target_count);
      });
      var task = candidates[0];
      var newCount = Math.min(task.completed_count + count, task.target_count);
      fetch(API + '/tasks/' + task.id + '/progress', {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ completed_count: newCount, time_spent: 0, accuracy: 0 })
      }).then(function() {
        task.completed_count = newCount;
        if (newCount >= task.target_count) task.status = 'completed';
        showToast((subject === 'english' ? '英语' : '数学') + '任务进度 ' + newCount + '/' + task.target_count + (newCount >= task.target_count ? ' 已完成!' : ''), newCount >= task.target_count ? 'success' : 'info');
      }).catch(function() {});
    }

    // ================================================================
    // 11. DASHBOARD
    // ================================================================

    function loadDashboard() {
      fetch(API + '/dashboard')
        .then(function(r) { return r.json(); })
        .then(function(data) {
          var tasks = data.tasks || [];
          var completed = tasks.filter(function(t) { return t.status === 'completed'; }).length;

          // Render stats cards
          var statsHTML = '';
          statsHTML += '<div style="background:var(--surface);border-radius:12px;padding:1rem;text-align:center;">'
            + '<div style="font-size:2rem;font-weight:700;color:var(--accent);" id="dash-tasks">' + completed + '/' + tasks.length + '</div>'
            + '<div style="font-size:0.8rem;color:var(--muted);">今日任务</div></div>';
          statsHTML += '<div style="background:var(--surface);border-radius:12px;padding:1rem;text-align:center;">'
            + '<div style="font-size:2rem;font-weight:700;color:var(--green);" id="dash-streak">' + (data.streak_days || 0) + '</div>'
            + '<div style="font-size:0.8rem;color:var(--muted);">连续天数</div></div>';
          statsHTML += '<div style="background:var(--surface);border-radius:12px;padding:1rem;text-align:center;">'
            + '<div style="font-size:2rem;font-weight:700;color:var(--pink);" id="dash-words">' + (data.word_mastered || 0) + '</div>'
            + '<div style="font-size:0.8rem;color:var(--muted);">已掌握单词</div></div>';
          var mathAcc = data.math_total > 0 ? Math.round(data.math_correct / data.math_total * 100) : 0;
          statsHTML += '<div style="background:var(--surface);border-radius:12px;padding:1rem;text-align:center;">'
            + '<div style="font-size:2rem;font-weight:700;color:var(--purple);" id="dash-math">' + mathAcc + '%</div>'
            + '<div style="font-size:0.8rem;color:var(--muted);">今日数学正确率</div></div>';
          document.getElementById('dashboard-stats').innerHTML = statsHTML;

          // Task list (clickable cards)
          var taskHTML = '';
          if (tasks.length === 0) {
            taskHTML = '<p style="color:var(--muted);">今日暂无任务，去任务页面添加吧！</p>';
          } else {
            tasks.forEach(function(t) {
              var statusClass = t.status === 'completed' ? 'done' : (t.status === 'in_progress' ? 'p1' : 'p0');
              var statusText = t.status === 'completed' ? '已完成' : (t.status === 'in_progress' ? '进行中' : '待开始');
              var pct = t.target_count > 0 ? Math.round(t.completed_count / t.target_count * 100) : 0;
              var targetPage = (t.subject === 'math') ? 'math' : 'english';
              taskHTML += '<div class="dash-task-card" onclick="showPage(\'' + targetPage + '\')">'
                + '<div class="task-info">'
                + '<div class="task-subject">' + (t.subject === 'english' ? '英语' : '数学') + ' - ' + t.task_type + ' (' + t.completed_count + '/' + t.target_count + ')</div>'
                + '<div style="background:var(--bg);border-radius:4px;height:5px;margin-top:4px;"><div style="width:' + pct + '%;height:100%;background:var(--accent2);border-radius:4px;transition:width 0.3s;"></div></div>'
                + '</div>'
                + '<div style="display:flex;align-items:center;gap:0.4rem;">'
                + '<span class="tag ' + statusClass + '">' + statusText + '</span>'
                + '<span class="task-arrow">\u203A</span></div></div>';
            });
          }
          document.getElementById('task-list').innerHTML = taskHTML;

          // Progress bars in dashboard
          var progHTML = '';
          for (var gid in groupMap) {
            var info = groupMap[gid];
            var name = groupNames[gid] || gid;
            var pctVal = info.total > 0 ? Math.round(info.mastered / info.total * 100) : 0;
            progHTML += '<div style="margin-bottom:0.4rem;">'
              + '<div style="display:flex;justify-content:space-between;font-size:0.8rem;margin-bottom:2px;">'
              + '<span>' + name + '</span><span style="color:var(--muted);">' + pctVal + '%</span></div>'
              + '<div style="background:var(--bg2);border-radius:4px;height:6px;">'
              + '<div style="width:' + pctVal + '%;height:100%;background:var(--accent2);border-radius:4px;transition:width 0.5s;"></div></div></div>';
          }
          document.getElementById('dash-progress-bars').innerHTML = progHTML;
        })
        .catch(function(err) { console.warn('Dashboard load failed', err); });

      // Load timeline heatmap
      fetch(API + '/stats/timeline?days=30')
        .then(function(r) {
          if (!r.ok) throw new Error('API error');
          return r.json();
        })
        .then(function(data) {
          if (!data || data.length === 0) {
            document.getElementById('timeline-heatmap').innerHTML = '<p style="color:var(--muted);font-size:0.85rem;margin-top:0.5rem;">暂无学习记录</p>';
            return;
          }
          var actMap = {};
          data.forEach(function(d) { actMap[d.date] = d.activities || 0; });

          var today = new Date();
          today.setHours(0,0,0,0);
          var endDate = new Date(today);
          var startDate = new Date(today);
          startDate.setDate(startDate.getDate() - 29);

          var dayLabels = ['一','二','三','四','五','六','日'];
          var html = '<div class="timeline-months"></div>';
          html += '<div style="display:flex;">';
          html += '<div class="timeline-labels">';
          dayLabels.forEach(function(l) { html += '<span>' + l + '</span>'; });
          html += '</div>';
          html += '<div class="timeline-grid">';

          // Adjust to Monday-based week: getDay() 0=Sun -> 6, 1=Mon -> 0, ...
          function toMondayBased(d) { return d.getDay() === 0 ? 6 : d.getDay() - 1; }

          var startDow = toMondayBased(startDate);
          var monthSpans = {};
          var cur = new Date(startDate);

          // Pad empty cells before start date
          for (var p = 0; p < startDow; p++) {
            html += '<div class="timeline-cell l0"></div>';
          }

          // Iterate through 30 days
          var totalCells = startDow; // count includes padding
          for (var i = 0; i < 30; i++) {
            var d = new Date(startDate);
            d.setDate(d.getDate() + i);
            var dateStr = d.getFullYear() + '-'
              + String(d.getMonth()+1).padStart(2,'0') + '-'
              + String(d.getDate()).padStart(2,'0');
            var count = actMap[dateStr] || 0;
            var level = count === 0 ? 'l0' : (count <= 2 ? 'l1' : (count <= 5 ? 'l2' : 'l3'));
            var isToday = (d.getTime() === today.getTime());
            html += '<div class="timeline-cell ' + level + (isToday ? ' today' : '') + '" title="' + dateStr + ': ' + count + '次">' + d.getDate() + '</div>';

            // Track month spans for labels
            var mKey = d.getFullYear() + '-' + (d.getMonth()+1);
            if (!monthSpans[mKey]) monthSpans[mKey] = { start: totalCells, label: (d.getMonth()+1) + '月' };
            monthSpans[mKey].end = totalCells;

            totalCells++;
          }

          // Pad remaining cells to complete last week column
          var remain = totalCells % 7;
          if (remain > 0) {
            for (var r = 0; r < 7 - remain; r++) {
              html += '<div class="timeline-cell l0"></div>';
            }
          }

          html += '</div></div>';

          // Build month labels
          var monthNames = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
          var monthsHTML = '';
          var cols = Math.ceil(totalCells / 7);
          var cellW = 28 + 3; // cell width + gap
          for (var mk in monthSpans) {
            var ms = monthSpans[mk];
            var colStart = Math.floor(ms.start / 7);
            var colEnd = Math.floor(ms.end / 7);
            var spanCols = colEnd - colStart + 1;
            monthsHTML += '<span style="display:inline-block;width:' + (spanCols * cellW) + 'px;text-align:left;">' + ms.label + '</span>';
          }

          document.getElementById('timeline-heatmap').innerHTML = html;
          var monthBar = document.getElementById('timeline-heatmap').querySelector('.timeline-months');
          if (monthBar) monthBar.innerHTML = monthsHTML;
        })
        .catch(function(err) {
          console.warn('Timeline load failed', err);
          document.getElementById('timeline-heatmap').innerHTML = '<p style="color:var(--muted);font-size:0.85rem;margin-top:0.5rem;">暂无学习记录</p>';
        });
    }
    loadDashboard();

    // ================================================================
    // 12. MATH PRACTICE
    // ================================================================

    var mathState = { op: '+', diff: 'L1', count: 20, sessionId: null, questions: [], current: 0, answers: [], startTime: null, timerInterval: null, elapsed: 0, isSubmitting: false, correctAnswers: [] };

    function setMathOp(op) {
      mathState.op = op;
      document.querySelectorAll('.math-op-btn').forEach(function(b) {
        b.classList.toggle('active', b.getAttribute('data-op') === op);
      });
    }
    function setMathDiff(diff) {
      mathState.diff = diff;
      document.querySelectorAll('.math-diff-btn').forEach(function(b) {
        b.classList.toggle('active', b.getAttribute('data-diff') === diff);
      });
    }

    function startMathTimer() {
      mathState.elapsed = 0;
      updateTimerDisplay();
      mathState.timerInterval = setInterval(function() {
        mathState.elapsed++;
        updateTimerDisplay();
      }, 1000);
    }
    function stopMathTimer() {
      if (mathState.timerInterval) { clearInterval(mathState.timerInterval); mathState.timerInterval = null; }
    }
    function updateTimerDisplay() {
      var m = String(Math.floor(mathState.elapsed / 60)).padStart(2, '0');
      var s = String(mathState.elapsed % 60).padStart(2, '0');
      var el = document.getElementById('math-timer');
      if (el) el.textContent = m + ':' + s;
    }

    function startMath() {
      mathState.count = parseInt(document.getElementById('math-count').value) || 20;
      mathState.isSubmitting = false;
      mathState.correctAnswers = [];
      document.getElementById('math-area').style.display = 'block';
      document.getElementById('math-result').style.display = 'none';
      document.getElementById('math-question').style.display = 'block';
      document.getElementById('math-feedback').innerHTML = '';

      fetch(API + '/math/generate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ operation: mathState.op, difficulty: mathState.diff, count: mathState.count })
      })
      .then(function(r) { return r.json(); })
      .then(function(data) {
        mathState.sessionId = data.session_id;
        mathState.questions = data.questions;
        mathState.current = 0;
        mathState.answers = [];
        mathState.startTime = Date.now();
        showMathQuestion();
        startMathTimer();
      })
      .catch(function(err) { showToast('出题失败: ' + err.message, 'error'); });
    }

    function showMathQuestion() {
      var q = mathState.questions[mathState.current];
      document.getElementById('math-q-text').textContent = q.num1 + ' ' + q.operator + ' ' + q.num2 + ' = ?';
      document.getElementById('math-status').textContent = '第 ' + (mathState.current + 1) + ' / ' + mathState.questions.length + ' 题';
      document.getElementById('math-answer').value = '';
      document.getElementById('math-feedback').innerHTML = '';
      document.getElementById('math-submit-btn').disabled = false;
      document.getElementById('math-answer').focus();
      mathState.isSubmitting = false;
    }

    function submitMathAnswer() {
      if (mathState.isSubmitting) return;
      var input = document.getElementById('math-answer');
      var ans = input.value.trim();
      if (ans === '') { showToast('请输入答案', 'warn', 1500); input.focus(); return; }
      var numAns = parseInt(ans);
      if (isNaN(numAns)) { showToast('请输入有效数字', 'warn', 1500); input.focus(); return; }

      mathState.isSubmitting = true;
      mathState.answers.push(numAns);

      var q = mathState.questions[mathState.current];
      var realAns = 0;
      switch (q.operator) {
        case '+': realAns = q.num1 + q.num2; break;
        case '-': realAns = q.num1 - q.num2; break;
        case '*': realAns = q.num1 * q.num2; break;
        case '/': realAns = q.num1 / q.num2; break;
      }
      var isCorrect = numAns === realAns;
      mathState.correctAnswers.push(isCorrect);

      var fb = document.getElementById('math-feedback');
      var qEl = document.getElementById('math-q-text');
      if (isCorrect) {
        qEl.classList.add('math-correct');
        fb.innerHTML = '<span class="math-feedback-icon" style="color:var(--green);">\u2714 \u6B63\u786E!</span>';
      } else {
        qEl.classList.add('math-wrong');
        fb.innerHTML = '<span class="math-feedback-icon" style="color:var(--accent);">\u2718</span>'
          + '<span style="font-size:1rem;color:var(--accent);">正确答案: <strong>' + realAns + '</strong></span>';
      }
      document.getElementById('math-submit-btn').disabled = true;

      setTimeout(function() {
        qEl.classList.remove('math-correct', 'math-wrong');
        mathState.current++;
        if (mathState.current < mathState.questions.length) {
          showMathQuestion();
        } else {
          finishMath();
        }
      }, isCorrect ? 400 : 1200);
    }

    function skipMathQuestion() {
      if (mathState.isSubmitting) return;
      mathState.answers.push(0);
      mathState.correctAnswers.push(false);
      mathState.current++;
      if (mathState.current < mathState.questions.length) {
        showMathQuestion();
      } else {
        finishMath();
      }
    }

    document.getElementById('math-answer').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') submitMathAnswer();
    });

    function finishMath() {
      stopMathTimer();
      document.getElementById('math-question').style.display = 'none';
      document.getElementById('math-result').style.display = 'block';

      fetch(API + '/math/submit', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ session_id: mathState.sessionId, answers: mathState.answers })
      })
      .then(function(r) { return r.json(); })
      .then(function(data) {
        var acc = Math.round(data.accuracy * 100);
        var emoji = acc >= 90 ? '\uD83C\uDF89' : (acc >= 60 ? '\uD83D\uDC4D' : '\uD83D\uDCAA');
        document.getElementById('math-result-text').textContent = emoji + ' 练习完成！';
        document.getElementById('math-result-detail').innerHTML =
          '共 <strong>' + data.total + '</strong> 题，答对 <strong>' + data.correct + '</strong> 题<br>'
          + '正确率：<strong>' + acc + '%</strong>，用时：<strong>' + mathState.elapsed + '</strong> 秒';

        var wrongList = document.getElementById('math-wrong-list');
        var wrongs = (data.results || []).filter(function(r) { return !r.is_correct; });
        if (wrongs.length > 0) {
          var html = '<div class="wrong-answer-list"><h4>\u2718 错题 (' + wrongs.length + ' 题)</h4>';
          wrongs.forEach(function(w) {
            html += '<div class="wrong-answer-item">'
              + '<span class="wrong-q">' + w.question + '</span>'
              + '<span><span class="wrong-ans">' + w.user_answer + '</span> \u2192 <span class="correct-ans">' + w.correct + '</span></span></div>';
          });
          html += '</div>';
          wrongList.innerHTML = html;
        } else {
          wrongList.innerHTML = acc === 100 ? '<p style="color:var(--green);font-weight:700;margin:0.5rem 0;">\u2B50 全部正确！太棒了！</p>' : '';
        }

        autoCheckin('math', 'arithmetic', data.total);
        fetchTodayTasks();
      })
      .catch(function(err) {
        document.getElementById('math-result-detail').textContent = '提交失败: ' + err.message;
        showToast('提交失败', 'error');
      });
    }

    // ================================================================
    // 13. TASK MANAGER
    // ================================================================

    function loadTaskManager() {
      var today = new Date().toISOString().slice(0, 10);
      fetch(API + '/tasks?date=' + today)
        .then(function(r) { return r.json(); })
        .then(function(data) {
          var tasks = data.tasks || [];
          var html = '';
          if (tasks.length === 0) {
            html = '<p style="color:var(--muted);">今日暂无任务</p>';
          } else {
            tasks.forEach(function(t) {
              var pct = t.target_count > 0 ? Math.round(t.completed_count / t.target_count * 100) : 0;
              var statusTag = t.status === 'completed'
                ? '<span class="tag done" style="margin-left:0.5rem;">已完成</span>'
                : (pct > 0 ? '<span class="tag p1" style="margin-left:0.5rem;">进行中</span>' : '<span class="tag p0" style="margin-left:0.5rem;">待开始</span>');
              html += '<div style="padding:0.6rem;border-bottom:1px solid var(--rule);">'
                + '<div style="display:flex;justify-content:space-between;align-items:center;">'
                + '<div><strong>' + (t.subject === 'english' ? '英语' : '数学') + ' - ' + t.task_type + '</strong>' + statusTag + '</div>'
                + '<span style="font-size:0.8rem;color:var(--muted);">' + t.completed_count + '/' + t.target_count + '</span></div>'
                + '<div style="background:var(--bg);border-radius:4px;height:6px;margin-top:0.3rem;">'
                + '<div style="width:' + pct + '%;height:100%;background:var(--accent2);border-radius:4px;transition:width 0.3s;"></div></div>'
                + '<div style="display:flex;gap:0.3rem;margin-top:0.3rem;">';
              if (t.status !== 'completed') {
                html += '<button onclick="updateTaskProgress(' + t.id + ', ' + Math.min(t.completed_count + 1, t.target_count) + ')" style="padding:2px 8px;font-size:0.75rem;background:var(--accent);color:#fff;border:none;border-radius:4px;cursor:pointer;">+1</button>';
              }
              html += '<button onclick="deleteTask(' + t.id + ')" style="padding:2px 8px;font-size:0.75rem;background:var(--bg);color:var(--muted);border:1px solid var(--rule);border-radius:4px;cursor:pointer;">删除</button></div></div>';
            });
          }
          document.getElementById('task-manage-items').innerHTML = html;
        })
        .catch(function(err) { console.warn('Task load failed', err); });
    }

    function createTask() {
      var subject = document.getElementById('task-subject').value;
      var type = document.getElementById('task-type').value;
      var count = parseInt(document.getElementById('task-count').value) || 10;
      var diff = document.getElementById('task-diff').value;
      var today = new Date().toISOString().slice(0, 10);

      fetch(API + '/tasks', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ task_date: today, subject: subject, task_type: type, target_count: count, difficulty: diff })
      })
      .then(function(r) { return r.json(); })
      .then(function() {
        loadTaskManager();
        loadDashboard();
        fetchTodayTasks();
        showToast('任务创建成功', 'success');
      })
      .catch(function(err) { showToast('创建失败: ' + err.message, 'error'); });
    }

    function updateTaskProgress(id, count) {
      fetch(API + '/tasks/' + id + '/progress', {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ completed_count: count, time_spent: 0, accuracy: 0 })
      })
      .then(function() {
        loadTaskManager();
        loadDashboard();
        fetchTodayTasks();
        showToast('进度已更新', 'success', 1500);
      })
      .catch(function(err) { showToast('更新失败: ' + err.message, 'error'); });
    }

    function deleteTask(id) {
      if (!confirm('确定删除此任务？')) return;
      fetch(API + '/tasks/' + id, { method: 'DELETE' })
        .then(function() {
          loadTaskManager();
          loadDashboard();
          fetchTodayTasks();
          showToast('任务已删除', 'info');
        })
        .catch(function(err) { showToast('删除失败: ' + err.message, 'error'); });
    }

    // ================================================================
    // 14. INJECTED STYLES (math/task tags)
    // ================================================================

    var style = document.createElement('style');
    style.textContent = '.math-op-btn,.math-diff-btn{padding:0.4rem 1rem;margin:0.2rem;border:1px solid var(--rule);border-radius:6px;background:var(--bg);color:var(--ink);cursor:pointer;font-size:0.9rem;transition:all 0.15s;}'
      + '.math-op-btn.active,.math-diff-btn.active{background:var(--accent);color:#fff;border-color:var(--accent);}'
      + '.tag{padding:2px 10px;border-radius:12px;font-size:0.75rem;font-weight:600;margin:2px;display:inline-block;}'
      + '.tag.done{background:#E8F8E8;color:#27AE60;}'
      + '.tag.p1{background:#FFF3E0;color:#E67E22;}'
      + '.tag.p0{background:#FFE0E0;color:#C0392B;}';
    document.head.appendChild(style);

    // ================================================================
    // 15. EXPOSE GLOBAL FUNCTIONS
    // ================================================================

    window.showPage = showPage;
    window.showChapter = showChapter;
    window.switchPhase = switchPhase;
    window.toggleTocSidebar = toggleTocSidebar;
    window.closeToc = closeToc;
    window.setMathOp = setMathOp;
    window.setMathDiff = setMathDiff;
    window.startMath = startMath;
    window.submitMathAnswer = submitMathAnswer;
    window.skipMathQuestion = skipMathQuestion;
    window.createTask = createTask;
    window.updateTaskProgress = updateTaskProgress;
    window.deleteTask = deleteTask;
    window.showToast = showToast;

    window.filterWords = function(btn, filter) {
      var filterGroup = btn.closest('.filter-group');
      var groupHeader = filterGroup.closest('.group-header');
      var grid = groupHeader ? groupHeader.nextElementSibling : filterGroup.nextElementSibling;
      while (grid && !grid.classList.contains('word-grid')) grid = grid.nextElementSibling;
      filterGroup.querySelectorAll('.filter-btn').forEach(function(b) { b.classList.remove('active'); });
      btn.classList.add('active');
      if (!grid) return;
      grid.querySelectorAll('.word-card').forEach(function(card) {
        if (filter === 'all') { card.style.display = ''; }
        else if (filter === 'mastered') { card.style.display = card.classList.contains('mastered') ? '' : 'none'; }
        else if (filter === 'unmastered') { card.style.display = card.classList.contains('mastered') ? 'none' : ''; }
      });
    };

    // ================================================================
    // 16. INITIALIZATION
    // ================================================================

    // Default: show dashboard
    // User can switch to english via stage tabs

    // Restore phase/chapter from localStorage
    var savedPhase = localStorage.getItem('cam_learn_phase');
    var savedChapter = localStorage.getItem('cam_learn_chapter');
    if (savedPhase && PHASES[savedPhase]) {
      currentPhase = savedPhase;
      document.querySelectorAll('.stage-tab').forEach(function(t) {
        t.classList.toggle('active', t.dataset.phase === currentPhase);
      });
      renderTOC();
      renderChapterNav();
      if (savedChapter) {
        showChapter(savedChapter);
      } else {
        var chapters = getChapters();
        if (chapters.length) showChapter(chapters[0].key);
      }
      showPage('english');
    }

  })();
  </script>
  <div class="toast-container" id="toast-container"></div>
</body>
</html>
